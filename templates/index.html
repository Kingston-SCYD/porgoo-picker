<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Character Controller</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <h1>OBS Character Controller</h1>

        <div id="obs-status" class="status">Checking OBS connection…</div>

        <div class="live-preview-wrap">
          <div class="live-preview-stage">
            <div id="live-preview" class="live-preview-character">
              <div class="facing">
                <div class="stack">
                  <img id="preview-body" class="layer" alt="preview body" />
                  <img id="preview-eyes" class="layer" alt="preview eyes" />
                  <img id="preview-mouth" class="layer" alt="preview mouth" />
                </div>
              </div>
              <div id="preview-name" class="name">Preview</div>
            </div>
          </div>
        </div>

        <form id="character-form" class="form">
          <label>
            Username
            <input type="text" id="username" maxlength="20" placeholder="stream_viewer123" required />
          </label>

          <div class="selector-group">
            <div class="selector-title">Body</div>
            <div class="selector" data-category="body">
              <button type="button" class="arrow prev">◀</button>
              <div class="center-box">
                <img class="preview" alt="body preview" />
                <div class="label">None</div>
              </div>
              <button type="button" class="arrow next">▶</button>
            </div>
          </div>

          <div class="selector-group">
            <div class="selector-title">Eyes</div>
            <div class="selector" data-category="eyes">
              <button type="button" class="arrow prev">◀</button>
              <div class="center-box">
                <img class="preview" alt="eyes preview" />
                <div class="label">None</div>
              </div>
              <button type="button" class="arrow next">▶</button>
            </div>
          </div>

          <div class="selector-group">
            <div class="selector-title">Mouth</div>
            <div class="selector" data-category="mouth">
              <button type="button" class="arrow prev">◀</button>
              <div class="center-box">
                <img class="preview" alt="mouth preview" />
                <div class="label">None</div>
              </div>
              <button type="button" class="arrow next">▶</button>
            </div>
          </div>

          <label>
            Hue: <span id="hue-value">0</span>
            <input type="range" id="hue" min="-180" max="180" value="0" />
          </label>

          <label>
            Saturation: <span id="saturation-value">100</span>%
            <input type="range" id="saturation" min="0" max="200" value="100" />
          </label>

          <label>
            Brightness: <span id="brightness-value">100</span>%
            <input type="range" id="brightness" min="20" max="200" value="100" />
          </label>

          <label>
            Size: <span id="size-value">128</span>px
            <input type="range" id="size" min="64" max="256" value="128" />
          </label>

          <label>
            Speed: <span id="speed-value">1.2</span>x
            <input type="range" id="speed" min="0.2" max="3.0" value="1.2" step="0.1" />
          </label>

          <button type="submit">Submit to Overlay</button>
        </form>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/control.js"></script>
  </body>
</html>
