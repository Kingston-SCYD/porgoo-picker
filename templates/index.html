<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Character Controller</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <h1>OBS Character Controller</h1>
        <p>Customize a character and push it to the OBS overlay.</p>

        <div id="obs-status" class="status">Checking OBS connection…</div>

        <form id="character-form" class="form">
          <label>
            Username
            <input type="text" id="username" maxlength="20" placeholder="stream_viewer123" required />
          </label>

          <label>
            Character color
            <input type="color" id="color" value="#66ccff" />
          </label>

          <label>
            Size: <span id="size-value">56</span>px
            <input type="range" id="size" min="24" max="120" value="56" />
          </label>

          <label>
            Speed: <span id="speed-value">1.2</span>x
            <input type="range" id="speed" min="0.2" max="3.0" value="1.2" step="0.1" />
          </label>

          <label>
            Style
            <select id="style">
              <option value="blob">Blob</option>
              <option value="square">Square</option>
              <option value="cat">Cat-ish</option>
            </select>
          </label>

          <button type="submit">Submit to Overlay</button>
        </form>

        <p class="small">
          Add <code>http://localhost:5000/overlay</code> as an OBS Browser Source pinned to your stream dimensions.
        </p>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/control.js"></script>
  </body>
</html>
