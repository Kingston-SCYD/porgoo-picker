<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OBS Character Controller</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="layout">
      <section class="card">
        <h1>OBS Character Controller</h1>

        <div id="obs-status" class="status">Checking OBS connection…</div>

        <form id="character-form" class="form">
          <label>
            Username
            <input type="text" id="username" maxlength="20" placeholder="stream_viewer123" required />
          </label>

          <div class="composer">
            <div class="arrow-column">
              <button type="button" class="arrow" id="body-prev">◀ Body</button>
              <button type="button" class="arrow" id="eyes-prev">◀ Eyes</button>
              <button type="button" class="arrow" id="mouth-prev">◀ Mouth</button>
            </div>

            <div class="preview-column">
              <div class="live-preview-stage">
                <div id="live-preview" class="live-preview-character">
                  <div class="facing">
                    <div class="stack">
                      <img id="preview-body" class="layer" alt="preview body" />
                      <img id="preview-eyes" class="layer" alt="preview eyes" />
                      <img id="preview-mouth" class="layer" alt="preview mouth" />
                    </div>
                  </div>
                  <div id="preview-name" class="name">Preview</div>
                </div>
              </div>

              <div class="selection-labels">
                <div><strong>Body:</strong> <span id="selected-body">None</span></div>
                <div><strong>Eyes:</strong> <span id="selected-eyes">None</span></div>
                <div><strong>Mouth:</strong> <span id="selected-mouth">None</span></div>
              </div>
            </div>

            <div class="arrow-column">
              <button type="button" class="arrow" id="body-next">Body ▶</button>
              <button type="button" class="arrow" id="eyes-next">Eyes ▶</button>
              <button type="button" class="arrow" id="mouth-next">Mouth ▶</button>
            </div>
          </div>

          <div class="sliders">
            <label>
              Hue: <span id="hue-value">0</span>
              <input type="range" id="hue" min="-180" max="180" value="0" />
            </label>

            <label>
              Saturation: <span id="saturation-value">100</span>%
              <input type="range" id="saturation" min="0" max="200" value="100" />
            </label>

            <label>
              Brightness: <span id="brightness-value">100</span>%
              <input type="range" id="brightness" min="20" max="200" value="100" />
            </label>

            <label>
              Speed: <span id="speed-value">1.2</span>x
              <input type="range" id="speed" min="0.2" max="3.0" value="1.2" step="0.1" />
            </label>
          </div>

          <button type="submit">Submit to Overlay</button>
        </form>
      </section>
    </main>

    <script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
    <script src="/static/control.js"></script>
  </body>
</html>
